name: Deploy Frontend to Production

on:
 push:
   branches:
     - prod

jobs:
 deploy:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v3
     
     - name: Setup Node.js
       uses: actions/setup-node@v3
       with:
         node-version: '20'
         
     - name: Configure Git
       run: |
         git config --global pull.rebase false
         git config --global user.email "github-actions@github.com"
         git config --global user.name "GitHub Actions"
         
     - name: Configure SSH
       env:
         SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
         SSH_HOST: ${{ secrets.SSH_HOST }}
         SSH_USER: ${{ secrets.SSH_USER }}
       run: |
         mkdir -p ~/.ssh
         echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
         chmod 600 ~/.ssh/deploy_key
         echo -e "StrictHostKeyChecking no\n" > ~/.ssh/config
         echo -e "Host ec2\n\tHostName $SSH_HOST\n\tUser $SSH_USER\n\tIdentityFile ~/.ssh/deploy_key\n\tStrictHostKeyChecking no" >> ~/.ssh/config
         
         echo "Testing SSH connection..."
         ssh -v ec2 "echo Connected successfully"

     - name: Create env file
       run: |
         cat << EOF > .env.production
         API_BASE_URL=https://api.prontapp.co/api/v1
         IMAGE_BASE_URL=https://api.prontapp.co
         NEXT_PUBLIC_IMAGE_BASE_URL=https://api.prontapp.co
         NEXT_PUBLIC_API_URL=https://api.prontapp.co/api/v1
         NEXT_PUBLIC_EPAYCO_TEST=false

         JWT_SECRET=${{ secrets.JWT_SECRET }}

         DOMAIN_URL=https://www.prontapp.co
         HTTP_S_DOMAIN_URL=https://www.prontapp.co
         EOF

     - name: Deploy to EC2
       run: |
         DEPLOY_PATH="/var/www/frontend"
         
         echo "Testing SSH connection to EC2..."
         ssh -v ec2 "pwd && whoami"
         
         echo "Reset to specific package version..."
         ssh ec2 "cd ${DEPLOY_PATH} && \
             git reset --hard HEAD && \
             git clean -fd && \
             npm install next@14.2.15 --save --save-exact && \
             git stash"
         
         echo "Pull changes..."
         ssh ec2 "cd ${DEPLOY_PATH} && git pull origin prod"
         
         echo "Copying environment file..."
         scp -v .env.production ec2:${DEPLOY_PATH}/.env.production
         
         echo "Clean install..."
         ssh ec2 "cd ${DEPLOY_PATH} && \
             rm -rf node_modules .next && \
             npm cache clean --force && \
             SHARP_IGNORE_GLOBAL_LIBVIPS=1 npm install --no-package-lock --legacy-peer-deps"
         
         echo "Building application..."
         ssh ec2 "cd ${DEPLOY_PATH} && npm run build"
         
         echo "Starting/Restarting PM2..."
         ssh ec2 "cd ${DEPLOY_PATH} && pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js"

     - name: Verify Deployment
       if: success()
       run: |
         ssh ec2 "cd ${DEPLOY_PATH} && pwd && ls -la && pm2 list"