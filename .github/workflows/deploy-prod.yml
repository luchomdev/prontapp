name: Deploy Frontend to Production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo -e "Host *\n\tServerAliveInterval 60\n\tServerAliveCountMax 60\n\tTCPKeepAlive yes\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
          echo -e "Host ec2\n\tHostName $SSH_HOST\n\tUser $SSH_USER\n\tIdentityFile ~/.ssh/deploy_key\n\tConnectTimeout 30\n\tStrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy to EC2
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          DEPLOY_PATH="/var/www/frontend"
          REPO_URL="https://x-access-token:${GIT_TOKEN}@github.com/prontappsas/prontappweb.git"
          
          echo "📁 Preparando directorio..."
          ssh ec2 "sudo rm -rf ${DEPLOY_PATH} && sudo mkdir -p ${DEPLOY_PATH} && sudo chown -R ubuntu:ubuntu ${DEPLOY_PATH}"
          
          echo "📥 Clonando repositorio..."
          ssh ec2 "cd /var/www && git clone ${REPO_URL} frontend && cd frontend && git checkout prod"
          
          echo "⚙️ Creando variables de entorno..."
          ssh ec2 "cat > ${DEPLOY_PATH}/.env.production << 'ENV_EOF'
          API_BASE_URL=https://api.prontapp.co/api/v1
          IMAGE_BASE_URL=https://api.prontapp.co
          NEXT_PUBLIC_IMAGE_BASE_URL=https://api.prontapp.co
          NEXT_PUBLIC_API_URL=https://api.prontapp.co/api/v1
          NEXT_PUBLIC_EPAYCO_TEST=false
          JWT_SECRET=${JWT_SECRET}
          DOMAIN_URL=https://www.prontapp.co
          HTTP_S_DOMAIN_URL=https://www.prontapp.co
          NEXT_PUBLIC_FBPIXEL=930982188631486
          NEXT_PUBLIC_VAPID_PUBLIC_KEY=BFST8vYrwU6w7d_qQH6WgnwXAdG4v4aIPY8anZmkBEYcAZTdCanxxbO1ZKMlSYpxVw8enMZTAOlZO6y5-ch25zg
          VAPID_PRIVATE_KEY=n2hS9oVrayQI97Lp5dR7cQDPrRfM_GL4GHLuQVLuN9M
          VAPID_EMAIL=noresponder@prontapp.co
          POSTGRES_USER='node_pg_nexus'
          POSTGRES_PASSWORD='Sonoma2024'
          POSTGRES_HOST='localhost'
          POSTGRES_PORT='5432'
          POSTGRES_DATABASE='nodenexus'
          ENV_EOF"
          
          echo "📦 Instalando dependencias..."
          ssh ec2 "cd ${DEPLOY_PATH} && npm cache clean --force && npm install"
          
          echo "�� Instalando tipos faltantes..."
          ssh ec2 "cd ${DEPLOY_PATH} && npm install --save-dev @types/web-push"
          
          echo "🏗️ Construyendo aplicación..."
          ssh ec2 "cd ${DEPLOY_PATH} && NODE_OPTIONS='--max-old-space-size=1024' npm run build"
          
          echo "🔄 Iniciando PM2..."
          ssh ec2 "cd ${DEPLOY_PATH} && pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js"
          
          echo "✅ Despliegue completado"
          ssh ec2 "cd ${DEPLOY_PATH} && pm2 list"

      - name: Health Check
        run: |
          sleep 30
          for i in {1..5}; do
            if curl -f -s https://www.prontapp.co > /dev/null; then
              echo "✅ Aplicación funcionando"
              break
            else
              echo "⏳ Intento $i/5..."
              sleep 10
            fi
          done
