name: Deploy Frontend to Production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo -e "Host ec2\n\tHostName $SSH_HOST\n\tUser $SSH_USER\n\tIdentityFile ~/.ssh/deploy_key\n\tStrictHostKeyChecking no\n\tServerAliveInterval 60\n\tServerAliveCountMax 60" > ~/.ssh/config

      - name: Create Production Environment File
        run: |
          cat << EOF > .env.production
          API_BASE_URL=https://api.prontapp.co/api/v1
          IMAGE_BASE_URL=https://api.prontapp.co
          NEXT_PUBLIC_IMAGE_BASE_URL=https://api.prontapp.co
          NEXT_PUBLIC_API_URL=https://api.prontapp.co/api/v1
          NEXT_PUBLIC_EPAYCO_TEST=false
          
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          
          DOMAIN_URL=https://www.prontapp.co
          HTTP_S_DOMAIN_URL=https://www.prontapp.co
          NEXT_PUBLIC_FBPIXEL=930982188631486
          NEXT_PUBLIC_VAPID_PUBLIC_KEY=BFST8vYrwU6w7d_qQH6WgnwXAdG4v4aIPY8anZmkBEYcAZTdCanxxbO1ZKMlSYpxVw8enMZTAOlZO6y5-ch25zg
          VAPID_PRIVATE_KEY=n2hS9oVrayQI97Lp5dR7cQDPrRfM_GL4GHLuQVLuN9M
          VAPID_EMAIL=noresponder@prontapp.co
          POSTGRES_USER='node_pg_nexus'
          POSTGRES_PASSWORD='Sonoma2024'
          POSTGRES_HOST='localhost'
          POSTGRES_PORT='5432'
          POSTGRES_DATABASE='nodenexus'
          EOF

      - name: Deploy to Production Server
        run: |
          DEPLOY_PATH="/var/www/frontend"
          REPO_URL="https://${{ secrets.GIT_TOKEN }}@github.com/prontappsas/prontappweb.git"
          
          echo "🚀 Iniciando despliegue..."
          
          # Limpiar y preparar directorio
          ssh ec2 "
            sudo rm -rf ${DEPLOY_PATH}
            sudo mkdir -p ${DEPLOY_PATH}
            sudo mkdir -p ${DEPLOY_PATH}/logs
            sudo chown -R ubuntu:ubuntu ${DEPLOY_PATH}
          "
          
          # Clonar repositorio con token personal
          ssh ec2 "
            cd /var/www
            git clone $REPO_URL frontend
            cd frontend
            git checkout prod
          "
          
          # Copiar archivo de entorno
          scp .env.production ec2:${DEPLOY_PATH}/.env.production
          
          # Instalar dependencias
          ssh ec2 "
            cd ${DEPLOY_PATH}
            npm cache clean --force
            npm install --production --no-fund --no-audit
          "
          
          # Construir aplicación
          ssh ec2 "
            cd ${DEPLOY_PATH}
            NODE_OPTIONS='--max-old-space-size=1024' npm run build
          "
          
          # Gestionar PM2
          ssh ec2 "
            cd ${DEPLOY_PATH}
            pm2 stop prontapp-frontend 2>/dev/null || true
            pm2 delete prontapp-frontend 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
          "
          
          echo "✅ Despliegue completado"

      - name: Verify Deployment
        run: |
          echo "🔍 Verificando despliegue..."
          ssh ec2 "
            cd /var/www/frontend
            pm2 list
            curl -f http://localhost:3000 > /dev/null && echo '✅ Aplicación responde correctamente' || echo '❌ Error en la aplicación'
          "
