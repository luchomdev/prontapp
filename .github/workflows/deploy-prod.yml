name: Deploy Frontend to Production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Configure Git
        run: |
          git config --global pull.rebase false
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          echo "$DEPLOY_KEY" > ~/.ssh/github_deploy_key
          chmod 600 ~/.ssh/deploy_key ~/.ssh/github_deploy_key
          # Configuración SSH mejorada con opciones de keep-alive
          echo -e "Host *\n\tServerAliveInterval 60\n\tServerAliveCountMax 60\n\tTCPKeepAlive yes\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
          echo -e "Host ec2\n\tHostName $SSH_HOST\n\tUser $SSH_USER\n\tIdentityFile ~/.ssh/deploy_key\n\tConnectTimeout 30\n\tStrictHostKeyChecking no" >> ~/.ssh/config
          echo -e "Host github.com\n\tIdentityFile ~/.ssh/github_deploy_key\n\tStrictHostKeyChecking no" >> ~/.ssh/config

      - name: Create env file
        run: |
          cat << EOF > .env.production
          API_BASE_URL=https://api.prontapp.co/api/v1
          IMAGE_BASE_URL=https://api.prontapp.co
          NEXT_PUBLIC_IMAGE_BASE_URL=https://api.prontapp.co
          NEXT_PUBLIC_API_URL=https://api.prontapp.co/api/v1
          NEXT_PUBLIC_EPAYCO_TEST=false

          JWT_SECRET=${{ secrets.JWT_SECRET }}

          DOMAIN_URL=https://www.prontapp.co
          HTTP_S_DOMAIN_URL=https://www.prontapp.co
          NEXT_PUBLIC_FBPIXEL=930982188631486
          NEXT_PUBLIC_VAPID_PUBLIC_KEY=BFST8vYrwU6w7d_qQH6WgnwXAdG4v4aIPY8anZmkBEYcAZTdCanxxbO1ZKMlSYpxVw8enMZTAOlZO6y5-ch25zg
          VAPID_PRIVATE_KEY=n2hS9oVrayQI97Lp5dR7cQDPrRfM_GL4GHLuQVLuN9M
          VAPID_EMAIL=noresponder@prontapp.co
          POSTGRES_USER='node_pg_nexus'
          POSTGRES_PASSWORD='Sonoma2024'
          POSTGRES_HOST='localhost'
          POSTGRES_PORT='5432'
          POSTGRES_DATABASE='nodenexus'
          EOF

      - name: Deploy to EC2
        run: |
          DEPLOY_PATH="/var/www/frontend"
          
          echo "Setting up GitHub SSH key on EC2..."
          scp -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ~/.ssh/github_deploy_key ec2:~/.ssh/
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ec2 "chmod 600 ~/.ssh/github_deploy_key"
          
          echo "Creating deployment directory..."
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ec2 "sudo rm -rf ${DEPLOY_PATH} && \
              sudo mkdir -p ${DEPLOY_PATH} && \
              sudo chown -R ubuntu:ubuntu ${DEPLOY_PATH}"
          
          echo "Cloning repository..."
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ec2 "cd /var/www && \
              GIT_SSH_COMMAND='ssh -i ~/.ssh/github_deploy_key' git clone git@github.com:prontappsas/prontappweb.git frontend && \
              cd frontend && \
              git checkout prod"
          
          echo "Copying environment file..."
          scp -o ServerAliveInterval=60 -o ServerAliveCountMax=60 .env.production ec2:${DEPLOY_PATH}/.env.production
          
          echo "Installing dependencies..."
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ec2 "cd ${DEPLOY_PATH} && \
              npm cache clean --force && \
              npm install --no-fund --no-audit --prefer-offline"
          
          echo "Building application..."
          # Dividimos el comando de construcción para evitar tiempos de espera largos
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ec2 "cd ${DEPLOY_PATH} && NODE_OPTIONS='--max-old-space-size=512' npm run build"
          
          echo "Starting/Restarting PM2..."
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ec2 "cd ${DEPLOY_PATH} && pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js"

      - name: Verify Deployment
        if: success()
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=60 ec2 "cd ${DEPLOY_PATH} && pwd && ls -la && pm2 list"